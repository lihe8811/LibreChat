name: Upstream Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPOSITORY: ${{ vars.UPSTREAM_REPOSITORY }}
      UPSTREAM_BRANCH: ${{ vars.UPSTREAM_BRANCH || 'main' }}
      SYNC_BRANCH: ${{ vars.SYNC_BRANCH || 'sync-upstream-main' }}
    steps:
      - name: Validate workflow configuration
        run: |
          test -n "$UPSTREAM_REPOSITORY" || {
            echo "UPSTREAM_REPOSITORY repo variable is required"
            exit 1
          }

      - name: Check out fork default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_SYNC_PAT || github.token }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git" || true
          git fetch upstream "$UPSTREAM_BRANCH"

      - name: Prepare sync branch
        id: prepare_sync_branch
        run: |
          git checkout -B "$SYNC_BRANCH" "origin/${GITHUB_REF_NAME}"
          if git merge-base --is-ancestor "upstream/${UPSTREAM_BRANCH}" "origin/${GITHUB_REF_NAME}"; then
            echo "sync_required=false" >> "$GITHUB_OUTPUT"
            echo "sync_mode=up-to-date" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge --no-ff --no-edit "upstream/${UPSTREAM_BRANCH}"; then
            echo "sync_required=true" >> "$GITHUB_OUTPUT"
            echo "sync_mode=merge-commit" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git merge --abort
          git checkout -B "$SYNC_BRANCH" "upstream/${UPSTREAM_BRANCH}"
          echo "sync_required=true" >> "$GITHUB_OUTPUT"
          echo "sync_mode=conflicted-pr" >> "$GITHUB_OUTPUT"

      - name: Push sync branch
        if: steps.prepare_sync_branch.outputs.sync_required == 'true'
        run: git push --force-with-lease origin "$SYNC_BRANCH"

      - name: Create or update sync pull request
        if: steps.prepare_sync_branch.outputs.sync_required == 'true'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_SYNC_PAT || github.token }}
        run: |
          if [ "${{ steps.prepare_sync_branch.outputs.sync_mode }}" = "conflicted-pr" ]; then
            pr_body="Automated upstream sync PR generated by the upstream sync workflow. This branch points at upstream because the scheduled merge hit conflicts and needs manual resolution."
          else
            pr_body="Automated upstream sync PR generated by the upstream sync workflow."
          fi

          existing_pr="$(gh pr list --head "$SYNC_BRANCH" --base "$GITHUB_REF_NAME" --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            echo "Sync PR #$existing_pr already exists"
            gh pr edit "$existing_pr" --body "$pr_body"
          else
            gh pr create \
              --base "$GITHUB_REF_NAME" \
              --head "$SYNC_BRANCH" \
              --title "Sync ${UPSTREAM_REPOSITORY}:${UPSTREAM_BRANCH}" \
              --body "$pr_body"
          fi
