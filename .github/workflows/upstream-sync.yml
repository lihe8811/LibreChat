name: Upstream Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    env:
      TARGET_BRANCH: ${{ github.event.repository.default_branch }}
      UPSTREAM_REPOSITORY: danny-avila/LibreChat
      UPSTREAM_BRANCH: main
      SYNC_BRANCH: sync-upstream-main
    steps:
      - name: Check out fork default branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT || github.token }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git" || true
          git fetch upstream "${UPSTREAM_BRANCH}"
          git fetch origin "${TARGET_BRANCH}" "${SYNC_BRANCH}" || true

      - name: Prepare sync branch
        id: prepare_sync_branch
        run: |
          git checkout -B "${SYNC_BRANCH}" "origin/${TARGET_BRANCH}"

          if git merge-base --is-ancestor "upstream/${UPSTREAM_BRANCH}" "origin/${TARGET_BRANCH}"; then
            echo "sync_required=false" >> "$GITHUB_OUTPUT"
            echo "sync_mode=up-to-date" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge --no-ff --no-edit "upstream/${UPSTREAM_BRANCH}"; then
            echo "sync_required=true" >> "$GITHUB_OUTPUT"
            echo "sync_mode=merge-commit" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git merge --abort
          git checkout -B "${SYNC_BRANCH}" "upstream/${UPSTREAM_BRANCH}"
          echo "sync_required=true" >> "$GITHUB_OUTPUT"
          echo "sync_mode=conflicted-pr" >> "$GITHUB_OUTPUT"

      - name: Push sync branch
        if: steps.prepare_sync_branch.outputs.sync_required == 'true'
        run: git push --force-with-lease origin "${SYNC_BRANCH}"

      - name: Create or update sync pull request
        if: steps.prepare_sync_branch.outputs.sync_required == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT || github.token }}
        run: |
          if [ "${{ steps.prepare_sync_branch.outputs.sync_mode }}" = "conflicted-pr" ]; then
            pr_title="Resolve upstream sync conflicts"
            pr_body="Automated upstream sync PR generated after the scheduled merge hit conflicts. This branch points at upstream/main and needs a manual conflict-resolution merge into ${TARGET_BRANCH}."
          else
            pr_title="Sync upstream/main into ${TARGET_BRANCH}"
            pr_body="Automated upstream sync PR generated by the upstream sync workflow."
          fi

          existing_pr="$(gh pr list --repo "${GITHUB_REPOSITORY}" --head "${SYNC_BRANCH}" --base "${TARGET_BRANCH}" --json number --jq '.[0].number')"

          if [ -n "${existing_pr}" ]; then
            gh pr edit "${existing_pr}" --repo "${GITHUB_REPOSITORY}" --title "${pr_title}" --body "${pr_body}"
          else
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base "${TARGET_BRANCH}" \
              --head "${SYNC_BRANCH}" \
              --title "${pr_title}" \
              --body "${pr_body}"
          fi
