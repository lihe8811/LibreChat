name: Upstream Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPOSITORY: ${{ vars.UPSTREAM_REPOSITORY }}
      UPSTREAM_BRANCH: ${{ vars.UPSTREAM_BRANCH || 'main' }}
      SYNC_BRANCH: ${{ vars.SYNC_BRANCH || 'sync-upstream-main' }}
    steps:
      - name: Validate workflow configuration
        run: |
          test -n "$UPSTREAM_REPOSITORY" || {
            echo "UPSTREAM_REPOSITORY repo variable is required"
            exit 1
          }

      - name: Check out fork default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_SYNC_PAT || github.token }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git" || true
          git fetch upstream "$UPSTREAM_BRANCH"

      - name: Prepare sync branch
        run: |
          git checkout -B "$SYNC_BRANCH" "origin/${GITHUB_REF_NAME}"
          git merge --no-ff --no-edit "upstream/${UPSTREAM_BRANCH}"

      - name: Push sync branch
        run: git push --force-with-lease origin "$SYNC_BRANCH"

      - name: Create or update sync pull request
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_SYNC_PAT || github.token }}
        run: |
          existing_pr="$(gh pr list --head "$SYNC_BRANCH" --base "$GITHUB_REF_NAME" --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            echo "Sync PR #$existing_pr already exists"
          else
            gh pr create \
              --base "$GITHUB_REF_NAME" \
              --head "$SYNC_BRANCH" \
              --title "Sync ${UPSTREAM_REPOSITORY}:${UPSTREAM_BRANCH}" \
              --body "Automated upstream sync PR generated by the upstream sync workflow."
          fi

